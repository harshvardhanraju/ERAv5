[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/tokenizer.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/vocab.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/merges.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
